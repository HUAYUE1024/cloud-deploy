# Cloud Deploy - GitHub Actions 工作流
# 自动测试和部署 shell 脚本项目

name: Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - staging
          - production
      method:
        description: '部署方式'
        required: true
        default: 'docker'
        type: choice
        options:
          - direct
          - docker
          - kubernetes
      strategy:
        description: '部署策略'
        required: true
        default: 'blue-green'
        type: choice
        options:
          - direct
          - rolling
          - blue-green
          - canary
      skip_test:
        description: '跳过测试'
        required: false
        default: false
        type: boolean

# 环境变量
env:
  DEPLOY_CONFIG: ${{ secrets.DEPLOY_CONFIG }}
  SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

# 并发控制
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shell 脚本检查
  lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck src/*.sh scripts/*.sh tests/*.sh || true

      - name: Check bash syntax
        run: |
          for f in src/*.sh scripts/*.sh; do
            echo "Checking: $f"
            bash -n "$f" || exit 1
          done

  # 单元测试
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x src/*.sh scripts/*.sh tests/*.sh

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq sshpass mailutils curl wget git

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run tests
        run: cd tests && bash run-tests.sh

  # 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Check for secrets
        run: |
          echo "Checking for potential secrets..."
          if grep -rn "password\|secret\|token\|key" src/ config/ --include="*.sh" --include="*.yaml" | grep -v "example\|test\|PASSWORD\|SECRET\|WEBHOOK"; then
            echo "Warning: Potential secrets found in code"
          fi

  # Docker 构建（仅在配置了 Docker Hub 凭据时运行）
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && secrets.DOCKER_USER != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USER }}/${{ github.event.repository.name }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到测试环境
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security, docker]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: staging
      url: http://staging.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install deploy tool
        run: |
          chmod +x scripts/install.sh
          sudo ./scripts/install.sh

      - name: Deploy to staging
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.STAGING_SERVER_PASSWORD }}
        run: |
          if [ -n "$SERVER_HOST" ]; then
            deploy --env staging \
                   --method direct \
                   --strategy rolling \
                   --host $SERVER_HOST \
                   --user $SERVER_USER \
                   --password $SERVER_PASSWORD
          else
            echo "Staging server not configured, skipping deployment"
          fi

  # 部署到生产环境
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security, deploy-staging]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: https://app.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install deploy tool
        run: |
          chmod +x scripts/install.sh
          sudo ./scripts/install.sh

      - name: Deploy to production
        env:
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.PROD_SERVER_PASSWORD }}
        run: |
          if [ -n "$SERVER_HOST" ]; then
            deploy --env production \
                   --method docker \
                   --strategy blue-green \
                   --host $SERVER_HOST \
                   --user $SERVER_USER \
                   --password $SERVER_PASSWORD
          else
            echo "Production server not configured, skipping deployment"
          fi

  # 部署通知
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging]
    if: always()
    steps:
      - name: Send DingTalk notification
        if: env.DINGTALK_WEBHOOK != ''
        run: |
          STATUS=${{ needs.deploy-production.result || needs.deploy-staging.result || 'skipped' }}
          if [ "$STATUS" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="成功"
          elif [ "$STATUS" = "skipped" ]; then
            STATUS_ICON="⏭️"
            STATUS_TEXT="跳过"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="失败"
          fi

          curl -s -X POST "${{ env.DINGTALK_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"${STATUS_ICON} 部署${STATUS_TEXT}\",
                \"text\": \"${STATUS_ICON} **部署${STATUS_TEXT}**\n\n**项目**: ${{ github.event.repository.name }}\n**分支**: ${{ github.ref_name }}\n**提交**: ${{ github.sha }}\n**时间**: $(date '+%Y-%m-%d %H:%M:%S')\"
              }
            }"

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK != ''
        run: |
          STATUS=${{ needs.deploy-production.result || needs.deploy-staging.result || 'skipped' }}
          if [ "$STATUS" = "success" ]; then
            COLOR="#4CAF50"
            STATUS_TEXT="成功"
          elif [ "$STATUS" = "skipped" ]; then
            COLOR="#2196F3"
            STATUS_TEXT="跳过"
          else
            COLOR="#F44336"
            STATUS_TEXT="失败"
          fi

          curl -s -X POST "${{ env.SLACK_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [
                {
                  \"color\": \"$COLOR\",
                  \"title\": \"部署${STATUS_TEXT}\",
                  \"text\": \"**项目**: ${{ github.event.repository.name }}\n**分支**: ${{ github.ref_name }}\n**提交**: ${{ github.sha }}\",
                  \"footer\": \"$(date '+%Y-%m-%d %H:%M:%S')\"
                }
              ]
            }"
