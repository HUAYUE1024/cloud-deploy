# Cloud Deploy - GitHub Actions 工作流
# 使用此工作流自动部署项目到云服务器

name: Deploy

on:
  push:
    branches:
      - main
      - master
      - production
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - staging
          - production
      method:
        description: '部署方式'
        required: true
        default: 'docker'
        type: choice
        options:
          - direct
          - docker
          - kubernetes
      strategy:
        description: '部署策略'
        required: true
        default: 'blue-green'
        type: choice
        options:
          - direct
          - rolling
          - blue-green
          - canary
      skip_test:
        description: '跳过测试'
        required: false
        default: false
        type: boolean

# 环境变量
env:
  DEPLOY_CONFIG: ${{ secrets.DEPLOY_CONFIG }}
  SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

# 并发控制
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 代码检查
  lint:
    name: Code Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  # 单元测试
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [16, 18, 20]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Run npm audit
        run: npm audit --production || true

  # 构建
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7

  # Docker 构建
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USER }}/${{ github.event.repository.name }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到开发环境
  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: http://dev.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install deploy tool
        run: |
          curl -fsSL https://raw.githubusercontent.com/HUAYUE1024/cloud-deploy/main/scripts/install.sh | bash

      - name: Deploy to development
        env:
          SERVER_HOST: ${{ secrets.DEV_SERVER_HOST }}
          SERVER_USER: ${{ secrets.DEV_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.DEV_SERVER_PASSWORD }}
        run: |
          deploy --env development \
                 --method direct \
                 --strategy direct \
                 --host $SERVER_HOST \
                 --user $SERVER_USER \
                 --password $SERVER_PASSWORD

  # 部署到测试环境
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: staging
      url: http://staging.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install deploy tool
        run: |
          curl -fsSL https://raw.githubusercontent.com/HUAYUE1024/cloud-deploy/main/scripts/install.sh | bash

      - name: Deploy to staging
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.STAGING_SERVER_PASSWORD }}
        run: |
          deploy --env staging \
                 --method docker \
                 --strategy rolling \
                 --host $SERVER_HOST \
                 --user $SERVER_USER \
                 --password $SERVER_PASSWORD

  # 部署到生产环境
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://app.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install deploy tool
        run: |
          curl -fsSL https://raw.githubusercontent.com/HUAYUE1024/cloud-deploy/main/scripts/install.sh | bash

      - name: Deploy to production
        env:
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.PROD_SERVER_PASSWORD }}
        run: |
          deploy --env production \
                 --method docker \
                 --strategy blue-green \
                 --host $SERVER_HOST \
                 --user $SERVER_USER \
                 --password $SERVER_PASSWORD

  # 部署通知
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging, deploy-development]
    if: always()
    steps:
      - name: Send DingTalk notification
        if: env.DINGTALK_WEBHOOK != ''
        run: |
          STATUS=${{ needs.deploy-production.result || needs.deploy-staging.result || needs.deploy-development.result }}
          if [ "$STATUS" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="成功"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="失败"
          fi

          curl -s -X POST "${{ env.DINGTALK_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"${STATUS_ICON} 部署${STATUS_TEXT}\",
                \"text\": \"${STATUS_ICON} **部署${STATUS_TEXT}**\n\n**项目**: ${{ github.event.repository.name }}\n**分支**: ${{ github.ref_name }}\n**提交**: ${{ github.sha }}\n**时间**: $(date '+%Y-%m-%d %H:%M:%S')\"
              }
            }"

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK != ''
        run: |
          STATUS=${{ needs.deploy-production.result || needs.deploy-staging.result || needs.deploy-development.result }}
          if [ "$STATUS" = "success" ]; then
            COLOR="#4CAF50"
            STATUS_TEXT="成功"
          else
            COLOR="#F44336"
            STATUS_TEXT="失败"
          fi

          curl -s -X POST "${{ env.SLACK_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [
                {
                  \"color\": \"$COLOR\",
                  \"title\": \"部署${STATUS_TEXT}\",
                  \"text\": \"**项目**: ${{ github.event.repository.name }}\n**分支**: ${{ github.ref_name }}\n**提交**: ${{ github.sha }}\",
                  \"footer\": \"$(date '+%Y-%m-%d %H:%M:%S')\"
                }
              ]
            }"
